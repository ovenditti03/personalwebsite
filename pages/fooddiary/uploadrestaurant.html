<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Restaurant</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <main class="entry-form-page">
        <section class="entry-form-shell">
            <div class="entry-form-header">
                <p class="entry-form-eyebrow">food diary</p>
                <h1>upload restaurant</h1>
                <p class="entry-form-subtitle">
                    add a restaurant visit and generate an object to drop into your diary feed.
                </p>
            </div>

            <form id="restaurantForm" class="entry-form">
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label for="title">restaurant name</label>
                        <input type="text" id="title" placeholder="ex: monteverde" required>
                    </div>

                    <div class="form-field">
                        <label for="location">location</label>
                        <input type="text" id="location" placeholder="city, state">
                    </div>

                    <div class="form-field">
                        <label for="stars">stars</label>
                        <input type="number" id="stars" min="0" max="5" placeholder="0-5">
                    </div>

                    <div class="form-field">
                        <label for="people">who you went with</label>
                        <input type="text" id="people" placeholder="comma separated">
                    </div>

                    <div class="form-field">
                        <label for="cuisine">cuisine</label>
                        <input type="text" id="cuisine" placeholder="italian, mexican, japanese...">
                    </div>

                    <div class="form-field">
                        <label for="mealType">meal type</label>
                        <input type="text" id="mealType" placeholder="breakfast, lunch, dinner">
                    </div>

                    <div class="form-field">
                        <label for="drink">drink</label>
                        <input type="text" id="drink" placeholder="what you had">
                    </div>

                    <div class="form-field full-width">
                        <label for="notes">notes</label>
                        <textarea id="notes" placeholder="favorite dish, vibe, memory, what stood out, etc."></textarea>
                    </div>

                    <div class="form-field">
                        <label for="mainImage">main photo</label>
                        <input type="file" id="mainImage" accept="image/*">
                    </div>

                    <div class="form-field">
                        <label for="photos">gallery photos</label>
                        <input type="file" id="photos" accept="image/*" multiple>
                    </div>
                </div>

                <button type="submit" class="entry-submit-button">generate entry object</button>
            </form>

            <section class="entry-output-shell">
                <h2>output</h2>
                <pre id="output"></pre>
            </section>
        </section>
    </main>

    <script>
        document.getElementById("restaurantForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const entry = {
                type: "restaurant",
                title: document.getElementById("title").value,
                location: document.getElementById("location").value,
                stars: Number(document.getElementById("stars").value || 0),
                people: document.getElementById("people").value.split(",").map(s => s.trim()).filter(Boolean),
                cuisine: document.getElementById("cuisine").value,
                mealType: document.getElementById("mealType").value,
                drink: document.getElementById("drink").value,
                inspiration: "",
                ingredients: [],
                mainImage: "../../images/food/YOUR-FOLDER/main.jpg",
                photos: [
                    "../../images/food/YOUR-FOLDER/1.jpg"
                ],
                notes: document.getElementById("notes").value
            };

            document.getElementById("output").textContent = JSON.stringify(entry, null, 4);
        });
    </script>
</body>
</html>

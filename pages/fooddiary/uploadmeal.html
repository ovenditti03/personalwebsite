<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Meal</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <main class="entry-form-page">
        <section class="entry-form-shell">
            <div class="entry-form-header">
                <p class="entry-form-eyebrow">food diary</p>
                <h1>upload home meal</h1>
                <p class="entry-form-subtitle">add a cozy little meal entry for your diary</p>
            </div>

            <form id="mealForm" class="entry-form">
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label for="title">meal name</label>
                        <input type="text" id="title" placeholder="ex: spicy vodka rigatoni" required>
                    </div>

                    <div class="form-field">
                        <label for="people">people dined with</label>
                        <input type="text" id="people" placeholder="comma separated">
                    </div>

                    <div class="form-field">
                        <label for="mealType">meal type</label>
                        <input type="text" id="mealType" placeholder="breakfast, lunch, dinner">
                    </div>

                    <div class="form-field full-width">
                        <label for="inspiration">inspiration</label>
                        <input type="text" id="inspiration" placeholder="recipe, TikTok, craving, cookbook...">
                    </div>

                    <div class="form-field full-width">
                        <label for="ingredients">ingredients</label>
                        <input type="text" id="ingredients" placeholder="comma separated">
                    </div>

                    <div class="form-field full-width">
                        <label for="notes">notes</label>
                        <textarea id="notes" placeholder="what you liked, what you'd change, little memory, etc."></textarea>
                    </div>

                    <div class="form-field">
                        <label for="mainImage">main photo</label>
                        <input type="file" id="mainImage" accept="image/*">
                    </div>

                    <div class="form-field">
                        <label for="photos">gallery photos</label>
                        <input type="file" id="photos" accept="image/*" multiple>
                    </div>
                </div>

                <button type="submit" class="entry-submit-button">generate entry object</button>
            </form>

            <section class="entry-output-shell">
                <h2>output</h2>
                <pre id="output"></pre>
            </section>
        </section>
    </main>

    <script>
        document.getElementById("mealForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const entry = {
                type: "meal",
                title: document.getElementById("title").value,
                location: "",
                stars: 0,
                people: document.getElementById("people").value.split(",").map(s => s.trim()).filter(Boolean),
                cuisine: "",
                mealType: document.getElementById("mealType").value,
                drink: "",
                inspiration: document.getElementById("inspiration").value,
                ingredients: document.getElementById("ingredients").value.split(",").map(s => s.trim()).filter(Boolean),
                mainImage: "../../images/food/YOUR-FOLDER/main.jpg",
                photos: [
                    "../../images/food/YOUR-FOLDER/1.jpg"
                ],
                notes: document.getElementById("notes").value
            };

            document.getElementById("output").textContent = JSON.stringify(entry, null, 4);
        });
    </script>
</body>
</html>
